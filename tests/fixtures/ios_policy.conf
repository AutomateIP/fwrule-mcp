! Cisco IOS / IOS-XE Running Configuration
! IOS Software, Version 15.7(3)M5
! Generated for firewall overlap test fixtures
!
hostname router-ios-01
!
! ============================================================
! Object Groups — Network
! ============================================================
object-group network WEB_SERVERS
 description Web server subnet
 10.1.1.0 0.0.0.255
!
object-group network DB_SERVERS
 description Database server subnet
 10.2.1.0 0.0.0.255
!
object-group network APP_SERVERS
 description Application server subnet
 10.3.1.0 0.0.0.255
!
object-group network MGMT_NET
 description Management network
 10.0.0.0 0.0.0.255
!
! ============================================================
! Object Groups — Service
! ============================================================
object-group service WEB_PORTS tcp
 description HTTP and HTTPS ports
 tcp eq www
 tcp eq https
!
! ============================================================
! Named Extended ACL — OUTSIDE_IN
! ============================================================
ip access-list extended OUTSIDE_IN
 remark Rule 1: Allow HTTP/HTTPS from any to web servers
 permit tcp any 10.1.1.0 0.0.0.255 eq 80
 permit tcp any 10.1.1.0 0.0.0.255 eq 443
 remark Rule 2: Allow MySQL from app servers to DB servers
 permit tcp 10.3.1.0 0.0.0.255 10.2.1.0 0.0.0.255 eq 3306
 remark Rule 3: Allow SSH from management to any
 permit tcp 10.0.0.0 0.0.0.255 any eq 22
 remark Rule 4: Allow app service ports from app to DB
 permit tcp 10.3.1.0 0.0.0.255 10.2.1.0 0.0.0.255 range 8080 8089
 remark Rule 5: Deny any TCP to DB servers on MySQL port
 deny tcp any 10.2.1.0 0.0.0.255 eq 3306
!
