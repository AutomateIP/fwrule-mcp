! Cisco ASA Running Configuration
! ASA Version 9.18(2)
! Generated for firewall overlap test fixtures
!
hostname firewall-asa-01
domain-name corp.example.com
!
! ============================================================
! Network Objects
! ============================================================
object network WEB_SERVERS
 subnet 10.1.1.0 255.255.255.0
 description Web server subnet in DMZ
!
object network DB_SERVERS
 subnet 10.2.1.0 255.255.255.0
 description Database server subnet
!
object network APP_SERVERS
 subnet 10.3.1.0 255.255.255.0
 description Application server subnet
!
object network MGMT_NET
 subnet 10.0.0.0 255.255.255.0
 description Management network
!
object network DMZ_SERVERS
 subnet 10.1.0.0 255.255.0.0
 description All DMZ servers (supernet)
!
! ============================================================
! Object Groups — Network
! ============================================================
object-group network ALL_INTERNAL
 description All internal server subnets
 network-object object WEB_SERVERS
 network-object object DB_SERVERS
 network-object object APP_SERVERS
!
! ============================================================
! Object Groups — Service
! ============================================================
object-group service WEB_PORTS tcp
 description HTTP and HTTPS ports
 port-object eq www
 port-object eq https
!
object-group service MGMT_PORTS tcp
 description Management service ports
 port-object eq ssh
!
! ============================================================
! Access Lists
! ============================================================
!
! Rule 1: Allow HTTP/HTTPS from any to web servers (inbound to DMZ)
access-list OUTSIDE_IN extended permit tcp any object WEB_SERVERS object-group WEB_PORTS
!
! Rule 2: Allow MySQL from app servers to DB servers
access-list INSIDE_IN extended permit tcp object APP_SERVERS object DB_SERVERS eq 3306
!
! Rule 3: Allow SSH management to all internal servers
access-list MGMT_ACCESS extended permit tcp object MGMT_NET object-group ALL_INTERNAL eq ssh
!
! Rule 4: Allow app service ports from app servers to DB servers
access-list INSIDE_IN extended permit tcp object APP_SERVERS object DB_SERVERS range 8080 8089
!
! Rule 5: Deny any access from DMZ to internal DB subnet
access-list DMZ_OUT extended deny tcp object DMZ_SERVERS object DB_SERVERS eq 3306
!
! Rule 6: Allow ICMP ping from management to all servers
access-list MGMT_ACCESS extended permit icmp object MGMT_NET object-group ALL_INTERNAL
!
! Rule 7: Deny all other DMZ to internal traffic (specific DMZ subnet only)
access-list DMZ_OUT extended deny ip object DMZ_SERVERS object-group ALL_INTERNAL
!
! ============================================================
! Interface Assignments (informational)
! ============================================================
access-group OUTSIDE_IN in interface outside
access-group INSIDE_IN in interface inside
access-group DMZ_OUT out interface dmz
access-group MGMT_ACCESS in interface management
