hostname router-iosxr-01
!
! ============================================================
! Object Groups — Network (IPv4)
! ============================================================
object-group network ipv4 WEB_SERVERS
 10.1.1.0/24
!
object-group network ipv4 DB_SERVERS
 10.2.1.0/24
!
object-group network ipv4 APP_SERVERS
 10.3.1.0/24
!
object-group network ipv4 MGMT_NET
 10.0.0.0/24
!
! ============================================================
! Object Groups — Port
! ============================================================
object-group port WEB_PORTS
 eq www
 eq https
!
! ============================================================
! IPv4 ACL — OUTSIDE_IN
! ============================================================
ipv4 access-list OUTSIDE_IN
 10 permit tcp any 10.1.1.0/24 eq www
 20 permit tcp any 10.1.1.0/24 eq https
 30 permit tcp 10.3.1.0/24 10.2.1.0/24 eq 3306
 40 permit tcp 10.0.0.0/24 any eq ssh
 50 permit tcp 10.3.1.0/24 10.2.1.0/24 range 8080 8089
 60 deny tcp any 10.2.1.0/24 eq 3306
!
